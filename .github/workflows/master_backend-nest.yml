name: Build and deploy NestJS backend to Azure Web App - backend-nest

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: backend-nest/package-lock.json

      - name: Install dependencies
        working-directory: backend-nest
        run: npm ci

      - name: Build
        working-directory: backend-nest
        run: npm run build

      - name: Test (non-blocking)
        working-directory: backend-nest
        run: npm run test --if-present || true

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: backend-nest
          path: backend-nest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-nest
          path: backend-nest

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'backend-nest'
          slot-name: 'Production'
          package: backend-nest
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E7D608A195434FD994903277BDE9F3F2 }}

